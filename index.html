<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Web App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Salom!</h1>
        <p>Bu mening Telegram Web App'im.</p>
        <button onclick="Telegram.WebApp.close()">Yopish</button>
    </div>

    <script>
        // Telegram Web App'ni ishga tushirish
        Telegram.WebApp.ready();
    </script>
</body>
</html>
