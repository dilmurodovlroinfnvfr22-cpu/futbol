<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Jumping Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; text-align: center; font-family: sans-serif; }
        #game { width: 100%; height: 200px; background: #fff; margin-top: 50px; position: relative; border-bottom: 5px solid #333; }
        #player { width: 50px; height: 50px; background: red; position: absolute; bottom: 0; left: 50px; }
        #obstacle { width: 30px; height: 30px; background: green; position: absolute; bottom: 0; right: 0; }
        .jump { animation: jump 0.5s linear; }
        @keyframes jump { 0% { bottom: 0; } 30% { bottom: 100px; } 70% { bottom: 100px; } 100% { bottom: 0; } }
        @keyframes move { 0% { right: -50px; } 100% { right: 100%; } }
        .animate { animation: move 1.5s infinite linear; }
    </style>
</head>
<body>
    <h3>O‘yin: Sakrash</h3>
    <p>O‘ynash uchun ekranga bosing</p>
    <div id="game" onclick="jump()">
        <div id="player"></div>
        <div id="obstacle" class="animate"></div>
    </div>

    <script>
        Telegram.WebApp.ready();
        function jump() {
            let player = document.getElementById("player");
            if (!player.classList.contains("jump")) {
                player.classList.add("jump");
                setTimeout(() => player.classList.remove("jump"), 500);
            }
        }
    </script>
</body>
</html>
