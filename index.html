<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>3D O'yin Poydevori</title>
    <style> body { margin: 0; overflow: hidden; } canvas { display: block; } </style>
</head>
<body>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        // 1. Sahnani yaratamiz
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Qahramon (Kub) - bu keyinchalik Subway Surfers odamchasi bo'ladi
        const geometry = new THREE.BoxGeometry();
        const material = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        camera.position.z = 5;

        // 3. O'yin tsikli (Game Loop)
        function animate() {
            requestAnimationFrame(animate);
            cube.rotation.x += 0.01;
            cube.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();

        // 4. Boshqaruv (Klaviatura)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') cube.position.x -= 0.5;
            if (e.key === 'ArrowRight') cube.position.x += 0.5;
        });
    </script>
</body>
</html>
