<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Runner Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #game-container { width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; font-size: 20px; font-weight: bold; pointer-events: none; }
        #game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: red; font-size: 40px; display: none; text-align: center; }
        #restart-btn { margin-top: 20px; padding: 10px 20px; font-size: 20px; cursor: pointer; pointer-events: auto; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="ui">Ball: <span id="score">0</span></div>
    <div id="game-over">
        O'YIN TUGADI!<br>
        <button id="restart-btn" onclick="restartGame()">Qayta boshlash</button>
    </div>

    <script>
        // Telegram Web App'ni ishga tushirish
        Telegram.WebApp.ready();
        Telegram.WebApp.expand(); // Saytni to'liq ekranda ochish

        let scene, camera, renderer, player, ground, obstacles = [];
        let score = 0, speed = 0.5, isGameOver = false;
        let clock = new THREE.Clock();

        function init() {
            // 1. Sahna (Scene)
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Osmon rangi

            // 2. Kamera (Camera)
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 10); // Qahramonning orqasida va tepasida
            camera.lookAt(0, 0, 0);

            // 3. Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true; // Soyalarni yoqish
            document.getElementById('game-container').appendChild(renderer.domElement);

            // 4. Yorug'lik (Lights)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 7);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            // 5. Yer/Relslar (Ground)
            const groundGeometry = new THREE.BoxGeometry(10, 1, 1000);
            const groundMaterial = new THREE.MeshPhongMaterial({ color: 0x555555 }); // To'q kulrang relslar
            ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.position.y = -0.5;
            ground.receiveShadow = true;
            scene.add(ground);

            // Yo'lak chiziqlari (Relslar dekoratsiyasi)
            for (let i = 0; i < 100; i++) {
                const lineGeometry = new THREE.BoxGeometry(0.2, 0.1, 5);
                const lineMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff });
                const line = new THREE.Mesh(lineGeometry, lineMaterial);
                line.position.set(2, 0.01, -i * 10);
                scene.add(line);
                const line2 = line.clone();
                line2.position.x = -2;
                scene.add(line2);
            }

            // 6. Qahramon (Player) - Hozircha oddiy kub
            const playerGeometry = new THREE.BoxGeometry(1, 2, 1);
            const playerMaterial = new THREE.MeshPhongMaterial({ color: 0xff0000 }); // Qizil o'yinchi
            player = new THREE.Mesh(playerGeometry, playerMaterial);
            player.position.y = 1;
            player.castShadow = true;
            scene.add(player);

            // 7. To'siqlar (Obstacles)
            createObstacles();

            // 8. Boshqaruv (Controls)
            window.addEventListener('keydown', onKeyDown);
            window.addEventListener('touchstart', onTouchStart);

            animate();
        }

        function createObstacles() {
            // To'siqlarni tozalash
            obstacles.forEach(obs => scene.remove(obs));
            obstacles = [];

            for (let i = 0; i < 20; i++) {
                const obsGeometry = new THREE.BoxGeometry(2, Math.random() * 3 + 1, 2);
                const obsMaterial = new THREE.MeshPhongMaterial({ color: 0x00ff00 }); // Yashil to'siqlar
                const obs = new THREE.Mesh(obsGeometry, obsMaterial);
                
                // Tasodifiy yo'lakka qo'yish (chap, o'rta, o'ng)
                const lane = Math.floor(Math.random() * 3);
                obs.position.x = (lane - 1) * 3;
                obs.position.y = obs.geometry.parameters.height / 2;
                obs.position.z = -i * 30 - 30; // Masofani uzoqlashtirish
                obs.castShadow = true;
                
                scene.add(obs);
                obstacles.push(obs);
            }
        }

        function onKeyDown(event) {
            if (isGameOver) return;
            if (event.key === 'ArrowLeft' && player.position.x > -3) player.position.x -= 3;
            if (event.key === 'ArrowRight' && player.position.x < 3) player.position.x += 3;
            if ((event.key === 'ArrowUp' || event.key === ' ') && player.position.y === 1) jump();
        }

        // Mobil qurilmalar uchun sensorli boshqaruv
        let touchStartX = 0;
        function onTouchStart(event) {
            if (isGameOver) return;
            touchStartX = event.touches[0].clientX;
            window.addEventListener('touchend', onTouchEnd);
        }

        function onTouchEnd(event) {
            const touchEndX = event.changedTouches[0].clientX;
            const diffX = touchEndX - touchStartX;

            if (diffX > 50 && player.position.x < 3) player.position.x += 3; // O'ngga surish
            else if (diffX < -50 && player.position.x > -3) player.position.x -= 3; // Chapga surish
            else if (Math.abs(diffX) < 10 && player.position.y === 1) jump(); // Oddiy bosish - sakrash

            window.removeEventListener('touchend', onTouchEnd);
        }

        function jump() {
            // Oddiy sakrash fizikasi
            let jumpHeight = 3;
            let jumpDuration = 0.5;
            let startTime = clock.getElapsedTime();

            function doJump() {
                let elapsed = clock.getElapsedTime() - startTime;
                if (elapsed < jumpDuration) {
                    player.position.y = 1 + jumpHeight * Math.sin((elapsed / jumpDuration) * Math.PI);
                    requestAnimationFrame(doJump);
                } else {
                    player.position.y = 1;
                }
            }
            doJump();
        }

        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);

            // O'yin tezligini oshirish
            speed += 0.0001;
            
            // Yer va dekoratsiyalarni orqaga surish (yugurish effekti)
            ground.position.z += speed;
            if (ground.position.z > 500) ground.position.z = 0;

            // To'siqlarni orqaga surish va to'qnashuvni tekshirish
            obstacles.forEach(obs => {
                obs.position.z += speed;
                
                // Agar to'siq o'yinchining orqasiga o'tsa, uni oldinga qaytarish
                if (obs.position.z > 15) {
                    obs.position.z = -500;
                    const lane = Math.floor(Math.random() * 3);
                    obs.position.x = (lane - 1) * 3;
                    obs.geometry = new THREE.BoxGeometry(2, Math.random() * 3 + 1, 2);
                    obs.position.y = obs.geometry.parameters.height / 2;
                    score++;
                    document.getElementById('score').innerText = score;
                }

                // To'qnashuvni tekshirish (Collision Detection)
                const playerBox = new THREE.Box3().setFromObject(player);
                const obsBox = new THREE.Box3().setFromObject(obs);
                
                if (playerBox.intersectsBox(obsBox)) {
                    endGame();
                }
            });

            renderer.render(scene, camera);
        }

        function endGame() {
            isGameOver = true;
            document.getElementById('game-over').style.display = 'block';
            // Telegram vibratsiyasini yoqish (agar qo'llab-quvvatlasa)
            if (Telegram.WebApp.HapticFeedback) {
                Telegram.WebApp.HapticFeedback.notificationOccurred('error');
            }
        }

        function restartGame() {
            score = 0;
            speed = 0.5;
            isGameOver = false;
            document.getElementById('score').innerText = score;
            document.getElementById('game-over').style.display = 'none';
            player.position.set(0, 1, 0);
            createObstacles();
            animate();
        }

        // Oyna o'lchami o'zgarganda moslashtirish
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
