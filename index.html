<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Pro Shashka</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .board { display: grid; grid-template-columns: repeat(8, 60px); grid-template-rows: repeat(8, 60px); border: 8px solid #0f3460; margin-top: 20px; }
        .cell { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .white { background: #f0d9b5; } .black { background: #b58863; }
        .piece { width: 45px; height: 45px; border-radius: 50%; border: 3px solid #000; transition: 0.2s; }
        .p1 { background: #e94560; } .p2 { background: #000; }
        .selected { outline: 4px solid yellow; transform: scale(1.1); }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #e94560; color: white; border: none; }
    </style>
</head>
<body>
    <h1>Shashka: Pro Level</h1>
    <div id="controls"><button onclick="startGame()">O'yinni boshlash</button></div>
    <div class="board" id="board"></div>
    <h2 id="status"></h2>

    <script>
        let board = Array(8).fill(null).map(() => Array(8).fill(0));
        let selected = null;
        let turn = 1; // 1: Player, 2: AI

        function startGame() {
            board = Array(8).fill(null).map(() => Array(8).fill(0));
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    if((r+c)%2 !== 0) {
                        if(r < 3) board[r][c] = 2;
                        else if(r > 4) board[r][c] = 1;
                    }
                }
            }
            turn = 1;
            document.getElementById('status').innerText = "Sizning navbatingiz";
            render();
        }

        function render() {
            const b = document.getElementById('board');
            b.innerHTML = '';
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell ' + ((r+c)%2 === 0 ? 'white' : 'black');
                    cell.onclick = () => handleCell(r, c);
                    if(board[r][c] !== 0) {
                        const p = document.createElement('div');
                        p.className = 'piece ' + (board[r][c] === 1 ? 'p1' : 'p2');
                        if(selected && selected.r === r && selected.c === c) p.classList.add('selected');
                        cell.appendChild(p);
                    }
                    b.appendChild(cell);
                }
            }
        }

        function handleCell(r, c) {
            if(turn !== 1) return;
            if(board[r][c] === 1) { selected = {r, c}; render(); }
            else if(selected && board[r][c] === 0) {
                let dr = selected.r - r;
                let dc = Math.abs(selected.c - c);

                // Oddiy yurish
                if(Math.abs(dr) === 1 && dc === 1 && dr > 0) {
                    movePiece(selected.r, selected.c, r, c);
                } 
                // Yeyish (Capture)
                else if(Math.abs(dr) === 2 && dc === 2) {
                    let midR = (selected.r + r) / 2;
                    let midC = (selected.c + c) / 2;
                    if(board[midR][midC] === 2) {
                        board[midR][midC] = 0;
                        movePiece(selected.r, selected.c, r, c);
                    }
                }
            }
        }

        function movePiece(fr, fc, tr, tc) {
            board[tr][tc] = board[fr][fc];
            board[fr][fc] = 0;
            selected = null;
            checkWinner();
            turn = 2;
            render();
            setTimeout(aiTurn, 800);
        }

        function aiTurn() {
            // AI Logic: Avvalo yeyishni qidiradi
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    if(board[r][c] === 2) {
                        // Yeyish imkoniyati bormi?
                        if(r+2 < 8 && c+2 < 8 && board[r+1][c+1] === 1 && board[r+2][c+2] === 0) {
                            board[r+1][c+1] = 0; board[r+2][c+2] = 2; board[r][c] = 0;
                            finishAiTurn(); return;
                        }
                    }
                }
            }
            // Oddiy yurish
            for(let r=7; r>=0; r--) {
                for(let c=0; c<8; c++) {
                    if(board[r][c] === 2 && r+1 < 8 && c+1 < 8 && board[r+1][c+1] === 0) {
                        board[r+1][c+1] = 2; board[r][c] = 0;
                        finishAiTurn(); return;
                    }
                }
            }
            finishAiTurn();
        }

        function finishAiTurn() { turn = 1; render(); checkWinner(); }

        function checkWinner() {
            let p1 = 0, p2 = 0;
            board.forEach(row => row.forEach(c => { if(c===1) p1++; if(c===2) p2++; }));
            if(p1 === 0) document.getElementById('status').innerText = "AI Yutdi! O'yin tugadi.";
            else if(p2 === 0) document.getElementById('status').innerText = "Siz Yutdingiz! O'yin tugadi.";
        }
    </script>
</body>
</html>
