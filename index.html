<!DOCTYPE html>
<html lang="uz">
<head>
    <style>
        body { background: #1a1a2e; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        .board { display: grid; grid-template-columns: repeat(8, 60px); grid-template-rows: repeat(8, 60px); border: 5px solid #0f3460; }
        .cell { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .white { background: #f0d9b5; } .black { background: #b58863; }
        .piece { width: 45px; height: 45px; border-radius: 50%; border: 3px solid #000; }
        .player { background: #e94560; } .ai { background: #000; }
        .selected { outline: 4px solid yellow; }
    </style>
</head>
<body>
    <h1>Shashka: Pro Level</h1>
    <div class="board" id="board"></div>

    <script>
        let board = Array(8).fill(null).map(() => Array(8).fill(0));
        let selected = null;
        let turn = 'player'; // 'player' yoki 'ai'

        // Boshlang'ich holat: 1-player, 2-ai
        for(let r=0; r<8; r++) {
            for(let c=0; c<8; c++) {
                if((r+c)%2 !== 0) {
                    if(r < 3) board[r][c] = 2;
                    else if(r > 4) board[r][c] = 1;
                }
            }
        }

        function render() {
            const b = document.getElementById('board');
            b.innerHTML = '';
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell ' + ((r+c)%2 === 0 ? 'white' : 'black');
                    cell.onclick = () => handleMove(r, c);
                    if(board[r][c] !== 0) {
                        const p = document.createElement('div');
                        p.className = 'piece ' + (board[r][c] === 1 ? 'player' : 'ai');
                        if(selected && selected.r === r && selected.c === c) p.classList.add('selected');
                        cell.appendChild(p);
                    }
                    b.appendChild(cell);
                }
            }
        }

        function handleMove(r, c) {
            if(turn !== 'player') return;

            // Donani tanlash
            if(board[r][c] === 1) {
                selected = {r, c};
                render();
            } 
            // Yurish
            else if(selected && board[r][c] === 0) {
                if(Math.abs(selected.r - r) === 1 && Math.abs(selected.c - c) === 1) {
                    board[r][c] = 1;
                    board[selected.r][selected.c] = 0;
                    selected = null;
                    turn = 'ai';
                    render();
                    setTimeout(aiMove, 500);
                }
            }
        }

        function aiMove() {
            // Oddiy AI: bitta yaroqli yurish topadi
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    if(board[r][c] === 2) {
                        // Pastga qarab yurishga urinadi
                        if(r+1 < 8 && c+1 < 8 && board[r+1][c+1] === 0) {
                            board[r+1][c+1] = 2;
                            board[r][c] = 0;
                            turn = 'player';
                            render();
                            return;
                        }
                    }
                }
            }
        }
        render();
    </script>
</body>
</html>
