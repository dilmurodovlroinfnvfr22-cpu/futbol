<!DOCTYPE html>
<html lang="uz">
<head>
    <style>
        body { background: #1a1a2e; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        .board { display: grid; grid-template-columns: repeat(8, 60px); grid-template-rows: repeat(8, 60px); border: 10px solid #0f3460; }
        .cell { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .white { background: #f0d9b5; } .black { background: #b58863; }
        .piece { width: 45px; height: 45px; border-radius: 50%; border: 3px solid #000; transition: 0.2s; }
        .p1 { background: #e94560; } .p2 { background: #000; }
        .selected { outline: 4px solid yellow; transform: scale(1.1); }
        .levels { margin: 20px; }
        button { padding: 10px; margin: 2px; cursor: pointer; background: #e94560; color: white; border: none; }
    </style>
</head>
<body>
    <h1>Shashka: Pro Edition</h1>
    <div class="levels" id="levels"></div>
    <div class="board" id="board"></div>

    <script>
        let board = Array(8).fill(null).map(() => Array(8).fill(0));
        let selected = null;
        let aiDifficulty = 1;

        // Boshlang'ich holat
        function resetGame() {
            board = Array(8).fill(null).map(() => Array(8).fill(0));
            for(let r=0; r<8; r++) for(let c=0; c<8; c++) {
                if((r+c)%2 !== 0) {
                    if(r < 3) board[r][c] = 2; // AI
                    else if(r > 4) board[r][c] = 1; // Player
                }
            }
            render();
        }

        // Darajalar
        const lvlDiv = document.getElementById('levels');
        for(let i=1; i<=10; i++) {
            let b = document.createElement('button');
            b.innerText = i;
            b.onclick = () => { aiDifficulty = i; resetGame(); };
            lvlDiv.appendChild(b);
        }

        function render() {
            const b = document.getElementById('board');
            b.innerHTML = '';
            for(let r=0; r<8; r++) for(let c=0; c<8; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell ' + ((r+c)%2 === 0 ? 'white' : 'black');
                cell.onclick = () => handleCell(r, c);
                if(board[r][c] !== 0) {
                    const p = document.createElement('div');
                    p.className = 'piece ' + (board[r][c] === 1 ? 'p1' : 'p2');
                    if(selected && selected.r === r && selected.c === c) p.classList.add('selected');
                    cell.appendChild(p);
                }
                b.appendChild(cell);
            }
        }

        function handleCell(r, c) {
            if(board[r][c] === 1) { selected = {r, c}; render(); }
            else if(selected && board[r][c] === 0) {
                // Yurish va Yeyish logikasi
                let dr = r - selected.r;
                let dc = Math.abs(c - selected.c);

                // Yeyish (2 katak masofa)
                if(Math.abs(dr) === 2 && dc === 2) {
                    let midR = (selected.r + r) / 2;
                    let midC = (selected.c + c) / 2;
                    if(board[midR][midC] === 2) {
                        board[r][c] = 1; board[midR][midC] = 0; board[selected.r][selected.c] = 0;
                        selected = null; render(); setTimeout(aiMove, 500);
                    }
                }
                // Oddiy yurish (1 katak)
                else if(Math.abs(dr) === 1 && dc === 1) {
                    board[r][c] = 1; board[selected.r][selected.c] = 0;
                    selected = null; render(); setTimeout(aiMove, 500);
                }
            }
        }

        function aiMove() {
            // AI Logikasi: Harakat qilish
            for(let r=0; r<8; r++) for(let c=0; c<8; c++) {
                if(board[r][c] === 2) {
                    // AI yeyishga harakat qiladi
                    if(r+2 < 8 && c+2 < 8 && board[r+1][c+1] === 1 && board[r+2][c+2] === 0) {
                        board[r+2][c+2] = 2; board[r+1][c+1] = 0; board[r][c] = 0;
                        render(); return;
                    }
                }
            }
            // Oddiy yurish
            for(let r=7; r>=0; r--) for(let c=0; c<8; c++) {
                if(board[r][c] === 2 && r+1 < 8 && c+1 < 8 && board[r+1][c+1] === 0) {
                    board[r+1][c+1] = 2; board[r][c] = 0;
                    render(); return;
                }
            }
        }

        resetGame();
    </script>
</body>
</html>
